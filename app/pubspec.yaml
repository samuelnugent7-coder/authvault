name: authvault
description: TOTP Authenticator & Password Safe
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1
  http_parser: ^4.0.2

  # Secure local storage (tokens, settings)
  flutter_secure_storage: ^9.2.2

  # QR code scanning (Android camera)
  mobile_scanner: ^5.2.3

  # TOTP calculation
  crypto: ^3.0.3
  base32: ^2.1.3

  # XML parsing
  xml: ^6.5.0

  # State management
  provider: ^6.1.2

  # UI extras
  # Backup - background scheduling
  workmanager: ^0.9.0
  # Backup - permissions
  permission_handler: ^11.3.1
  # Backup - device identity
  device_info_plus: ^10.1.0
  # Path utilities
  path: ^1.9.0

  # UI extras
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  path_provider: ^2.1.3
  encrypt: ^5.0.3
  connectivity_plus: ^6.0.5
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
