name: authvault_desktop
description: AuthVault – Windows desktop client

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  http_parser: ^4.0.2
  path: ^1.9.0
  shared_preferences: ^2.3.3
  crypto: ^3.0.3
  base32: ^2.1.3
  xml: ^6.5.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  window_manager: ^0.4.2
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.3
  encrypt: ^5.0.3
  connectivity_plus: ^6.0.5
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
